networks:
  caddy-public:
    driver: overlay
    attachable: true
  auth-backend:
    external: true
    name: mariadb_auth-backend

volumes:
  caddy-data:
  emby-certs:

configs:
  emby_cert_converter:
    file: ./emby-cert-converter.sh

secrets:
  caddyfile:
    file: ./secret_caddyfile
  cloudflare_api_token:
    file: ./secret_cloudflare-api-token
  acme_email:
    file: ./secret_acme-email
  emby_pkcs12_password:
    file: ./secret_emby-pkcs12-password
  emby_domain:
    file: ./secret_emby-domain

services:
  caddy:
    image: ghcr.io/madic-creates/swarm-git-ops/caddy-custom:latest
    networks:
      - caddy-public
      - auth-backend
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy-data:/data
    secrets:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
        mode: 0444
      - cloudflare_api_token
      - acme_email
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        export CLOUDFLARE_API_TOKEN=$$(cat /run/secrets/cloudflare_api_token) &&
        export ACME_EMAIL=$$(cat /run/secrets/acme_email) &&
        caddy docker-proxy --caddyfile-path /etc/caddy/Caddyfile
    environment:
      CADDY_INGRESS_NETWORKS: caddy_caddy-public
      REDIS_HOST: redis_redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
    deploy:
      mode: global
      restart_policy:
        condition: any

  emby-cert-converter:
    image: alpine:3.21
    entrypoint: /bin/sh
    command: ["/scripts/emby-cert-converter.sh"]
    networks:
      - auth-backend
    volumes:
      - emby-certs:/certs
    configs:
      - source: emby_cert_converter
        target: /scripts/emby-cert-converter.sh
        mode: 0755
    secrets:
      - emby_pkcs12_password
      - emby_domain
    environment:
      REDIS_HOST: redis_redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
